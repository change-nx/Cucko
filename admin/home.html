<div class="max-w-6xl mx-auto">

    <!-- 信息卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <!-- 基本信息 -->
        <div class="card">
            <div class="flex items-center gap-3 mb-5">
                <i class="fas fa-info-circle text-indigo-500 text-xl"></i>
                <h3 class="text-lg font-semibold text-slate-800">基本信息</h3>
            </div>
            <div id="basicInfo" class="space-y-3">
                <div class="flex justify-between py-2 border-b border-slate-100">
                    <span class="text-slate-500">机器人QQ</span>
                    <span class="font-medium text-slate-700" id="qq">-</span>
                </div>
                <div class="flex justify-between py-2 border-b border-slate-100">
                    <span class="text-slate-500">自触模式</span>
                    <span id="touch" class="px-2 py-1 rounded-full text-xs font-medium">-</span>
                </div>
                <div class="flex justify-between py-2 border-b border-slate-100">
                    <span class="text-slate-500">主人列表</span>
                    <span id="owner" class="text-slate-700 text-right">-</span>
                </div>
            </div>
        </div>

        <!-- 连接信息 -->
        <div class="card">
            <div class="flex items-center gap-3 mb-5">
                <i class="fas fa-plug text-emerald-500 text-xl"></i>
                <h3 class="text-lg font-semibold text-slate-800">连接配置</h3>
            </div>
            <div id="connInfo" class="space-y-3">
                <div class="flex justify-between py-2 border-b border-slate-100">
                    <span class="text-slate-500">API地址</span>
                    <span id="api" class="text-slate-700 text-right break-all">-</span>
                </div>
                <div class="flex justify-between py-2 border-b border-slate-100">
                    <span class="text-slate-500">API Token</span>
                    <span id="apiToken" class="text-slate-700 font-mono text-sm">-</span>
                </div>
                <div class="flex justify-between py-2">
                    <span class="text-slate-500">HTTP Token</span>
                    <span id="httpToken" class="text-slate-700 font-mono text-sm">-</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadBotInfo() {
        const statusDiv = document.getElementById('botStatus');
        const basicInfoDiv = document.getElementById('basicInfo');
        
        try {
            const response = await fetch('../api.php?plat=onebot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'get_info' })
            });
            const result = await response.json();
            
            if (result.code === 200 && result.data) {
                const data = result.data;
                // 更新基本信息
                document.getElementById('qq').textContent = data.qq || '-';
                
                const touchElem = document.getElementById('touch');
                if (data.touch) {
                    touchElem.innerHTML = '<span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs">已开启</span>';
                } else {
                    touchElem.innerHTML = '<span class="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs">已关闭</span>';
                }
                
                const ownerList = data.owner || [];
                document.getElementById('owner').innerHTML = ownerList.length > 0 
                    ? ownerList.map(id => `<span class="inline-block bg-slate-100 px-2 py-1 rounded text-xs mr-1">${id}</span>`).join('')
                    : '<span class="text-slate-400">未设置</span>';
                
                document.getElementById('api').textContent = data.api || '-';
                document.getElementById('apiToken').textContent = data.api_token || '(空)';
                document.getElementById('httpToken').textContent = data.http_token || '(空)';
            } else {
                statusDiv.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-amber-500 text-3xl"></i>
                    <p class="text-amber-600 mt-2">获取配置失败</p>
                `;
            }
        } catch (error) {
            console.error('获取机器人信息失败:', error);
            statusDiv.innerHTML = `
                <i class="fas fa-times-circle text-red-500 text-3xl"></i>
                <p class="text-red-600 mt-2">网络错误，无法连接</p>
            `;
        }
    }
    
    // 页面加载时获取信息
    loadBotInfo();
</script>
